# Prebuilt binaries for Windows / Linux / macOS (GitHub issue #3).
# Every push to master builds all platforms and uploads artifacts; pushing a tag (v*) attaches
# them to the release. AVX2 is OFF for shipped binaries (issue #1: 0xc000001d on pre-2013 CPUs);
# build locally with -DHSR_AVX2=ON if you want the faster cooks on a modern machine.
name: build
on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake -S hsr_renderer_cpp -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target hsr_renderer
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory pkg/fonts | Out-Null
          Copy-Item build/hsr_renderer.exe pkg/
          Copy-Item hsr_renderer_cpp/third_party/fonts/* pkg/fonts/
          Compress-Archive -Path pkg/* -DestinationPath hsr_renderer-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: hsr_renderer-windows-x64
          path: hsr_renderer-windows-x64.zip

  linux:
    runs-on: ubuntu-22.04   # older glibc = the AppImage runs on more distros
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build xorg-dev libwayland-dev libxkbcommon-dev libvulkan-dev
      - name: Configure
        run: cmake -S hsr_renderer_cpp -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target hsr_renderer
      - name: Package tar.gz
        run: |
          mkdir -p pkg/fonts
          cp build/hsr_renderer pkg/
          cp hsr_renderer_cpp/third_party/fonts/* pkg/fonts/
          tar -czf hsr_renderer-linux-x64.tar.gz -C pkg .
      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin/fonts
          cp build/hsr_renderer AppDir/usr/bin/
          cp hsr_renderer_cpp/third_party/fonts/* AppDir/usr/bin/fonts/
          cp hsr_renderer_cpp/app.png AppDir/hsr_renderer.png
          cat > AppDir/hsr_renderer.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Quest Home Editor
          Exec=hsr_renderer
          Icon=hsr_renderer
          Categories=Graphics;
          EOF
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/hsr_renderer" "$@"
          EOF
          chmod +x AppDir/AppRun
          curl -sSfL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir hsr_renderer-linux-x64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: hsr_renderer-linux-x64
          path: |
            hsr_renderer-linux-x64.tar.gz
            hsr_renderer-linux-x64.AppImage

  macos:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
            
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Deps (MoltenVK = the Vulkan implementation on macOS; ninja)
        run: brew install ninja molten-vk
      - name: Configure
        run: cmake -S hsr_renderer_cpp -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DCMAKE_OSX_ARCHITECTURES=x86_64 -DASTCENC_ISA_SSE41=ON -DASTCENC_NEON=OFF
      - name: Build
        run: cmake --build build --target hsr_renderer
      - name: Package dmg (.app bundle with MoltenVK beside the binary — volk dlopens it)
        run: |
          APP="Quest Home Editor.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/fonts"
          cp build/hsr_renderer "$APP/Contents/MacOS/"
          MVK="$(brew --prefix molten-vk)/lib/libMoltenVK.dylib"
          cp "$MVK" "$APP/Contents/MacOS/"
          cp hsr_renderer_cpp/app.png "$APP/Contents/Resources/"
          cp hsr_renderer_cpp/third_party/fonts/* "$APP/Contents/Resources/fonts/"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>hsr_renderer</string>
            <key>CFBundleIdentifier</key><string>com.xastroboy.questhomeeditor</string>
            <key>CFBundleName</key><string>Quest Home Editor</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          hdiutil create -volname "Quest Home Editor" -srcfolder "$APP" -ov -format UDZO hsr_renderer-macos-${{ matrix.arch }}.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: hsr_renderer-macos-${{ matrix.arch }}
          path: hsr_renderer-macos-${{ matrix.arch }}.dmg

release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. INITIALIZE GIT: This fixes the "not a git repository" error
      - uses: actions/checkout@v4

      # 2. DOWNLOAD ARTIFACTS: Pulls in the compiled binaries from the other runners
      - uses: actions/download-artifact@v4
        with: 
          merge-multiple: true

      # 3. CREATE RELEASE: Bypasses third-party actions and safely publishes using the GitHub CLI
      - name: Create or Update Release via GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking downloaded files..."
          ls -la

          # Clean up old tags locally and remotely so we can overwrite them cleanly
          gh release delete latest-build --yes || true
          git push --delete origin latest-build || true

          # Create the fresh rolling release and attach all files
          gh release create latest-build \
            --title "Quest Home Editor - Latest Build" \
            --notes "Automated rolling prebuilt binaries compiled from your master branch." \
            --prerelease \
            hsr_renderer-windows-x64.zip \
            hsr_renderer-linux-x64.tar.gz \
            hsr_renderer-linux-x64.AppImage \
            hsr_renderer-macos-x64.dmg
